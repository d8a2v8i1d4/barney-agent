name: 每日投資決策日報

on:
  schedule:
    # 每天 00:00 UTC = 08:00 台北時間（UTC+8）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily investment report
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          REPORT_RECIPIENT: d8a2v8i1d4@gmail.com
          TZ: Asia/Taipei
        run: python scripts/daily_invest_report.py

      - name: Commit history files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 000_Agent/memory/invest-history/
          if git diff --staged --quiet; then
            echo "No history changes to commit"
          else
            DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)
            git commit -m "invest: ${DATE} 決策日報（自動產生）"
            git push origin HEAD:main
          fi
