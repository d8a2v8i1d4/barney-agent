name: 每日投資決策日報

on:
  schedule:
    # 每天 00:00 UTC = 08:00 台北時間（UTC+8）
    - cron: '0 0 * * 1-5'   # 週一到週五（可改 * 包含週末）
  workflow_dispatch:          # 手動觸發備用

jobs:
  daily-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 允許 git push 歷史檔案
      id-token: write         # claude-code-action 需要 OIDC token

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run daily investment report via Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: agent           # 排程觸發，非 @claude mention 模式
          allowed_tools: >
            Bash,
            Read,
            Write,
            Edit,
            WebSearch,
            WebFetch,
            mcp__Gmail__create_draft
          mcp_config: |
            {
              "mcpServers": {
                "gmail": {
                  "command": "npx",
                  "args": ["-y", "@gptscript-ai/gmail-mcp"],
                  "env": {
                    "GMAIL_CREDENTIALS": "${{ secrets.GMAIL_CREDENTIALS }}"
                  }
                }
              }
            }
          direct_prompt: |
            你是 Barney 的投資情報分析師。
            請執行今日投資決策日報，步驟如下：

            1. Bash `date` 確認台北時間（UTC+8）
            2. 讀取 000_Agent/memory/invest-portfolio.json 取得部位
            3. 讀取最近 7 天歷史（000_Agent/memory/invest-history/*.json）
            4. 依照 CLAUDE.md 的投資日報規則（Step 0–Step 8）執行：
               - 抓取巨集指標：VIX、10Y、2Y、DXY、USD/TWD
               - 抓取所有觀察清單標的價格
               - 計算環境分數與個股分數
               - 輸出 HTML 報告
               - 寫入歷史 JSON 與 lastrun.txt
               - 建立 Gmail 草稿寄給 d8a2v8i1d4@gmail.com
               - git add + commit + push 歷史檔案

            注意：
            - 台北時間 = UTC+8，日期計算前先執行 date
            - 禁止顯示 N/A，每個標的至少嘗試 3 種抓取方式
            - portfolio.json 不自動修改（只有實際下單後才更新）
